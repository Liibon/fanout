syntax = "proto3";

package hdsearch.v1;

option go_package = "github.com/liibon/fanout/gen/hdsearchv1";

service HDSearch {
  rpc Search(SearchRequest) returns (SearchResponse);
}

message SearchRequest {
  repeated float query_vector  = 1;
  int32          top_k         = 2;
  string         request_id    = 3;
  repeated int64 candidate_ids = 4; // if non-empty, leaf scores only these global IDs
}

message SearchResult {
  int64 vector_id = 1;
  float distance  = 2;
}

message SearchResponse {
  repeated SearchResult results          = 1;
  string                responding_leaf  = 2;
  int64                 latency_us       = 3;
  int32                 shards_queried   = 4;
  int32                 shards_responded = 5;
  int64                 index_us         = 6; // root: candidate-generation time
  int64                 merge_us         = 7; // root: top-K merge time
}
