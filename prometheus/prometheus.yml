global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: root
    static_configs:
      - targets: ['root:9102']

  - job_name: leaves
    static_configs:
      - targets:
          - 'leaf-0:9103'
          - 'leaf-1:9103'
          - 'leaf-2:9103'
          - 'leaf-3:9103'
          - 'leaf-4:9103'
          - 'leaf-5:9103'
          - 'leaf-6:9103'
          - 'leaf-7:9103'
          - 'leaf-8:9103'
          - 'leaf-9:9103'
          - 'leaf-10:9103'
          - 'leaf-11:9103'
          - 'leaf-12:9103'
          - 'leaf-13:9103'
          - 'leaf-14:9103'
          - 'leaf-15:9103'
