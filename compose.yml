  # ── root ──────────────────────────────────────────────────────────────────

  root:
    build:
      context: .
      dockerfile: root/Dockerfile
    restart: unless-stopped
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - FAN_OUT=${FAN_OUT:-16}
      - TOP_K=${TOP_K:-10}
      - PER_LEAF_TIMEOUT_MS=${PER_LEAF_TIMEOUT_MS:-100}
      - HEDGING=${HEDGING:-false}
      - HEDGING_DELAY_MS=${HEDGING_DELAY_MS:-20}
      - RETRY=${RETRY:-false}
      - MAX_RETRIES=${MAX_RETRIES:-1}
      - LEAF_ADDRS=leaf-0:50051,leaf-1:50051,leaf-2:50051,leaf-3:50051,leaf-4:50051,leaf-5:50051,leaf-6:50051,leaf-7:50051,leaf-8:50051,leaf-9:50051,leaf-10:50051,leaf-11:50051,leaf-12:50051,leaf-13:50051,leaf-14:50051,leaf-15:50051
    ports:
      - "50051:50051"
      - "9102:9102"   # Prometheus metrics
    depends_on:
      - leaf-0
      - leaf-1
      - leaf-2
      - leaf-3
      - leaf-4
      - leaf-5
      - leaf-6
      - leaf-7
      - leaf-8
      - leaf-9
      - leaf-10
      - leaf-11
      - leaf-12
      - leaf-13
      - leaf-14
      - leaf-15
      - otel-collector

  # ── load generator (runs once, use docker compose run loadgen for custom runs) ──

  loadgen:
    build:
      context: .
      dockerfile: loadgen/Dockerfile
    profiles: ["loadgen"]
    environment:
      - ROOT_ADDR=root:50051
    command:
      - "-root=root:50051"
      - "-qps=${QPS:-100}"
      - "-warmup=500"
      - "-measure=5000"
      - "-dim=${DIM:-128}"
      - "-top-k=${TOP_K:-10}"
    depends_on:
      - root

volumes:
  dataset:

  grafana:
    image: grafana/grafana:10.3.3
    ports: ["3000:3000"]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
