x-leaf: &leaf
  build:
    context: .
    dockerfile: leaf/Dockerfile
  restart: unless-stopped
  environment:
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    - DATASET_PATH=/data/dataset.bin
    - NUM_VECTORS=${NUM_VECTORS:-1000000}
    - NUM_LEAVES=${FAN_OUT:-16}
    - DIM=${DIM:-128}
    - SYNTHETIC=${SYNTHETIC:-false}
    - SYNTHETIC_MU=${SYNTHETIC_MU:-2.5}
    - SYNTHETIC_SIGMA=${SYNTHETIC_SIGMA:-0.6}
    - SYNTHETIC_HEAVY_PCT=${SYNTHETIC_HEAVY_PCT:-0.01}
    - SYNTHETIC_HEAVY_MU=${SYNTHETIC_HEAVY_MU:-5.0}
    - SYNTHETIC_HEAVY_SIGMA=${SYNTHETIC_HEAVY_SIGMA:-0.3}
  volumes:
    - dataset:/data
  depends_on:
    dataset-gen:
      condition: service_completed_successfully
    otel-collector:
      condition: service_started

services:

  # ── infrastructure ────────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint

  jaeger:
    image: jaegertracing/all-in-one:1.55.0
    ports:
      - "16686:16686"  # UI
      - "14250:14250"  # gRPC (from otel-collector)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v2.50.1
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=1h'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # ── dataset generation (one-shot) ─────────────────────────────────────────

  dataset-gen:
    build:
      context: .
      dockerfile: dataset/Dockerfile
    command:
      - "-n=${NUM_VECTORS:-1000000}"
      - "-dim=${DIM:-128}"
      - "-seed=42"
      - "-out=/data/dataset.bin"
    volumes:
      - dataset:/data

  # ── leaf services (16 shards) ─────────────────────────────────────────────

  leaf-0:
    <<: *leaf
    environment:
      - LEAF_ID=0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - DATASET_PATH=/data/dataset.bin
      - NUM_VECTORS=${NUM_VECTORS:-1000000}
      - NUM_LEAVES=${FAN_OUT:-16}
      - DIM=${DIM:-128}
      - SYNTHETIC=${SYNTHETIC:-false}
      - SYNTHETIC_MU=${SYNTHETIC_MU:-2.5}
      - SYNTHETIC_SIGMA=${SYNTHETIC_SIGMA:-0.6}
      - SYNTHETIC_HEAVY_PCT=${SYNTHETIC_HEAVY_PCT:-0.01}
      - SYNTHETIC_HEAVY_MU=${SYNTHETIC_HEAVY_MU:-5.0}
      - SYNTHETIC_HEAVY_SIGMA=${SYNTHETIC_HEAVY_SIGMA:-0.3}
  leaf-1:
    <<: *leaf
    environment:
      - LEAF_ID=1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - DATASET_PATH=/data/dataset.bin
