      - NUM_LEAVES=${FAN_OUT:-16}
      - DIM=${DIM:-128}
      - SYNTHETIC=${SYNTHETIC:-false}
      - SYNTHETIC_MU=${SYNTHETIC_MU:-2.5}
      - SYNTHETIC_SIGMA=${SYNTHETIC_SIGMA:-0.6}
      - SYNTHETIC_HEAVY_PCT=${SYNTHETIC_HEAVY_PCT:-0.01}
      - SYNTHETIC_HEAVY_MU=${SYNTHETIC_HEAVY_MU:-5.0}
