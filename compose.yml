x-leaf: &leaf
  build: { context: ., dockerfile: leaf/Dockerfile }
  environment: [DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128]
  volumes: [dataset:/data]

services:
  dataset-gen:
    build: { context: ., dockerfile: dataset/Dockerfile }
    command: ["-n=1000000", "-dim=128", "-seed=42", "-out=/data/dataset.bin"]
    volumes: [dataset:/data]

  leaf-0:  { <<: *leaf, environment: [LEAF_ID=0,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-1:  { <<: *leaf, environment: [LEAF_ID=1,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-2:  { <<: *leaf, environment: [LEAF_ID=2,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-3:  { <<: *leaf, environment: [LEAF_ID=3,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-4:  { <<: *leaf, environment: [LEAF_ID=4,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-5:  { <<: *leaf, environment: [LEAF_ID=5,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-6:  { <<: *leaf, environment: [LEAF_ID=6,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-7:  { <<: *leaf, environment: [LEAF_ID=7,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-8:  { <<: *leaf, environment: [LEAF_ID=8,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-9:  { <<: *leaf, environment: [LEAF_ID=9,  DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-10: { <<: *leaf, environment: [LEAF_ID=10, DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-11: { <<: *leaf, environment: [LEAF_ID=11, DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-12: { <<: *leaf, environment: [LEAF_ID=12, DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-13: { <<: *leaf, environment: [LEAF_ID=13, DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-14: { <<: *leaf, environment: [LEAF_ID=14, DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }
  leaf-15: { <<: *leaf, environment: [LEAF_ID=15, DATASET_PATH=/data/dataset.bin, NUM_VECTORS=1000000, NUM_LEAVES=16, DIM=128] }

  root:
    build: { context: ., dockerfile: root/Dockerfile }
    environment:
      - LEAF_ADDRS=leaf-0:50051,leaf-1:50051,leaf-2:50051,leaf-3:50051,leaf-4:50051,leaf-5:50051,leaf-6:50051,leaf-7:50051,leaf-8:50051,leaf-9:50051,leaf-10:50051,leaf-11:50051,leaf-12:50051,leaf-13:50051,leaf-14:50051,leaf-15:50051
      - FAN_OUT=16
      - TOP_K=10
      - PER_LEAF_TIMEOUT_MS=100
    restart: unless-stopped
    ports: ["50051:50051"]
    depends_on: [leaf-0,leaf-1,leaf-2,leaf-3,leaf-4,leaf-5,leaf-6,leaf-7,leaf-8,leaf-9,leaf-10,leaf-11,leaf-12,leaf-13,leaf-14,leaf-15]

volumes:
  dataset:
