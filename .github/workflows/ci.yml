name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go vet ./root/... ./loadgen/... ./dataset/...
      - run: go vet -tags stub ./leaf/...
      - run: go test -race ./root/... ./loadgen/... ./dataset/...
      - run: go build -o /dev/null ./root/.
      - run: go build -o /dev/null ./loadgen/.
      - run: go build -o /dev/null ./dataset/.
